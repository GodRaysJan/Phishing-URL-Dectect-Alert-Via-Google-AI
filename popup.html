<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 350px; 
      font-family: 'Segoe UI', sans-serif; 
      padding: 10px; 
      margin: 0;
      box-sizing: border-box;
    }
    h3 { margin-top: 0; font-size: 16px; }
    
    .toggle-container { 
      margin-bottom: 10px; 
      padding: 8px; 
      background: #f8f9fa; 
      border-radius: 4px;
      font-size: 13px;
    }
    
    #scanBtn { 
      width: 100%; 
      padding: 8px; 
      cursor: pointer; 
      background: #007bff; 
      color: white; 
      border: none; 
      border-radius: 4px;
      font-weight: bold;
    }

    /* Scrollable container for the table */
    .table-wrapper {
      margin-top: 10px;
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid #eee;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      table-layout: fixed; /* Prevents long URLs from stretching the table */
    }

    th, td { 
      padding: 6px; 
      font-size: 11px; 
      text-align: left; 
      border-bottom: 1px solid #eee;
    }

    th { 
      background: #f4f4f4; 
      position: sticky; 
      top: 0; /* Keeps headers visible while scrolling */
    }

    /* Column sizing and truncation */
    .col-url { width: 65%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-res { width: 35%; text-align: center; }
    
    .safe { color: #28a745; font-weight: bold; }
    .malicious { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Phishing Scanner</h3>
  
  <div class="toggle-container">
    <label><input type="checkbox" id="emailModeToggle"> Auto-Scan Emails (Gmail/Outlook)</label>
  </div>

  <button id="scanBtn">Scan Current Page</button>
  
  <div class="table-wrapper" id="tableWrapper" style="display:none;">
    <table>
      <thead>
        <tr>
          <th class="col-url">URL</th>
          <th class="col-res">Result</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>

  <script src="popup.js"></script>
</body>
</html>
